<div class="profile-container">
    <div class="page-header">
        <h1>Admin Profile</h1>
        <p>Manage your account credentials and personal information</p>
    </div>

    <div class="toast success" *ngIf="successMessage">
        <i class="fa fa-check-circle"></i> {{ successMessage }}
    </div>
    <div class="toast error" *ngIf="errorMessage">
        <i class="fa fa-exclamation-circle"></i> {{ errorMessage }}
    </div>

    <div class="profile-card">
        <form (ngSubmit)="onSubmit()" #profileForm="ngForm">
            <div class="form-section">
                <h3>Account Information</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" [(ngModel)]="profileData.username" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" [(ngModel)]="profileData.email" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Update Password</h3>
                <p class="section-desc">Leave blank if you don't want to change your password</p>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="password">New Password</label>
                        <input type="password" id="password" name="password" [(ngModel)]="profileData.password"
                            placeholder="Min 8 characters">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword"
                            [(ngModel)]="profileData.confirmPassword" placeholder="Repeat new password">
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="save-btn" [disabled]="loading || !profileForm.form.valid">
                    <i class="fa fa-spinner fa-spin" *ngIf="loading"></i>
                    {{ loading ? 'Saving...' : 'Save Changes' }}
                </button>
            </div>
        </form>
    </div>
</div>
