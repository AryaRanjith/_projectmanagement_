<div class="employee-dashboard">
    <div class="welcome-header">
        <div class="welcome-left">
            <div class="user-avatar-icon">
                <i class="fa fa-user"></i>
            </div>
            <div class="welcome-text">
                <h1>Employee Dashboard</h1>
                <p>My Tasks</p>
            </div>
        </div>
    </div>

    <div class="loading-container" *ngIf="loading">
        <i class="fa fa-spinner fa-spin fa-3x"></i>
    </div>

    <div class="dashboard-content" *ngIf="!loading">

        <div class="task-grid" *ngIf="tasks.length > 0">
            <div class="task-simple-card" *ngFor="let task of tasks">
                <div class="card-content">
                    <h3>{{ task.title }}</h3>
                    <div class="task-detail">
                        <strong>Project:</strong> <span>{{ task.project_name }}</span>
                    </div>
                    <div class="task-detail">
                        <strong>Deadline:</strong> <span>{{ task.due_date | date:'dd MMM y' }}</span>
                    </div>
                    <!-- Progress Update Slider (Interactive) -->
                    <div class="task-progress" *ngIf="task.status === 'IN_PROGRESS'">
                        <div class="progress-label">
                            <span>Update Progress</span>
                            <span class="progress-value">{{ task.progress || 0 }}%</span>
                        </div>
                        <div class="range-container">
                            <input type="range" min="0" max="100" [value]="task.progress || 0"
                                (input)="onProgressDragging(task, $event)" (change)="onProgressChange(task, $event)"
                                class="progress-slider">
                        </div>
                    </div>
                </div>

                <div class="card-footer-simple">
                    <span class="status-pill" [ngClass]="task.status.toLowerCase()">
                        {{ getStatusLabel(task.status) }}
                    </span>

                    <select class="status-dropdown" [(ngModel)]="task.status">
                        <option value="TODO">Pending</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="DONE">Completed</option>
                    </select>

                    <button class="btn-primary-square" (click)="updateStatus(task)" [disabled]="task.updating">
                        {{ task.updating ? '...' : 'Update' }}
                    </button>
                </div>
            </div>
        </div>

        <div class="empty-state" *ngIf="tasks.length === 0">
            <i class="fa fa-check-circle-o"></i>
            <h3>All caught up!</h3>
            <p>You have no pending tasks assigned to you.</p>
        </div>

    </div>
</div>
