<nav class="owner-navbar">
    <div class="navbar-left">
        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" [(ngModel)]="searchQuery" (keyup.enter)="onGlobalSearch()"
                placeholder="Search projects, tasks...">
        </div>
    </div>

    <div class="navbar-right">
        <!-- Notifications -->
        <div class="nav-item notification-wrapper">
            <button class="icon-btn" (click)="toggleNotificationsPanel()">
                <i class="fa fa-bell"></i>
                <span class="badge" *ngIf="getUnreadCount() > 0">{{ getUnreadCount() }}</span>
            </button>

            <div class="notification-panel" *ngIf="showNotifications">
                <div class="panel-header">
                    <h4>Notifications</h4>
                    <span class="count">{{ getUnreadCount() }} new</span>
                </div>
                <div class="notification-list">
                    <div class="notification-item" *ngFor="let notif of notifications" [class.unread]="!notif.is_read"
                        (click)="markAsRead(notif)">
                        <div class="notif-icon">
                            <i class="fa fa-info-circle"></i>
                        </div>
                        <div class="notif-content">
                            <p class="notif-message">{{ notif.message }}</p>
                            <span class="notif-time">{{ notif.created_at | date:'shortTime' }}</span>
                        </div>
                    </div>
                    <div class="no-notifications" *ngIf="notifications.length === 0">
                        No new notifications
                    </div>
                </div>
            </div>
        </div>

        <!-- Profile -->
        <div class="profile-wrapper">
            <button class="profile-btn" (click)="toggleProfile()">
                <div class="avatar">
                    <span>{{ companyName.charAt(0) }}</span>
                </div>
                <div class="profile-info">
                    <span class="profile-name">{{ companyName }}</span>
                    <span class="profile-role">Owner</span>
                </div>
                <i class="fa fa-chevron-down"></i>
            </button>

            <div class="profile-dropdown" *ngIf="showProfileDropdown">
                <div class="dropdown-header">
                    <div class="avatar"><span>{{ companyName.charAt(0) }}</span></div>
                    <div class="header-info">
                        <span class="profile-name">{{ companyName }}</span>
                        <span class="profile-role">{{ companyEmail }}</span>
                    </div>
                </div>
                <div class="dropdown-menu">
                    <a class="dropdown-item" routerLink="/owner/subscription" (click)="showProfileDropdown = false">
                        <i class="fa fa-diamond"></i>
                        <span>Subscriptions</span>
                    </a>
                </div>
                <div class="dropdown-divider"></div>
                <a class="dropdown-item logout" (click)="logout()">
                    <i class="fa fa-sign-out"></i>
                    <span>Sign Out</span>
                </a>
            </div>
        </div>
    </div>
</nav>
