<app-navbar></app-navbar>

<div class="auth-wrapper">
  <div class="mesh-gradient"></div>

  <div class="auth-container">
    <div class="glass-card">
      <div class="card-header">
        <div class="logo-area">
          <div class="logo-icon">
            <i class="fas fa-layer-group"></i>
          </div>
          <span class="logo-text">PROJECT Manage</span>
        </div>
        <h2>Sign In</h2>
      </div>

      <form (ngSubmit)="onLoginSubmit()" class="auth-form" autocomplete="off">
        <div class="input-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope field-icon"></i>
            <input type="email" [(ngModel)]="email" name="user_auth_email" placeholder="Enter Email" required
              autocomplete="off">
          </div>
        </div>

        <div class="input-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock field-icon"></i>
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="user_auth_password"
              placeholder="Enter Password" required autocomplete="off">
            <button type="button" class="eye-btn" (click)="togglePasswordVisibility()">
              <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
            </button>
          </div>
        </div>

        <div class="form-row">
          <label class="check-container">
            <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe">
            <span class="checkmark"></span>
            Keep me signed in
          </label>
        </div>

        <button type="submit" class="primary-btn" [disabled]="isLoading">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="loader"></span>
        </button>

        <div class="error-box" *ngIf="statusMessage">
          {{ statusMessage }}
        </div>
      </form>

      <div class="card-footer">
        New to Project Manage? <a routerLink="/account/signup">Create an account</a>
      </div>
    </div>
  </div>
</div>
