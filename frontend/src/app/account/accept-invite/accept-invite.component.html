<div class="accept-invite-container">
    <div class="invite-card">
        <div class="header">
            <div class="icon-circle">
                <i class="fa fa-envelope-open-text invite-icon"></i>
            </div>
            <h1>Welcome Aboard!</h1>
            <p *ngIf="invitation">You've been invited by <strong>{{ invitation.organisation_name }}</strong> to join
                their team.</p>
        </div>

        <div class="loading-state" *ngIf="loading">
            <div class="spinner-container">
                <i class="fa fa-circle-notch fa-spin"></i>
            </div>
            <p>Verifying your invitation...</p>
        </div>

        <div class="error-state" *ngIf="error">
            <div class="error-circle">
                <i class="fa fa-times"></i>
            </div>
            <p>{{ error }}</p>
            <button class="btn-primary" routerLink="/account/login">Return to Login</button>
        </div>

        <div class="form-wrapper" *ngIf="!loading && !error && invitation">
            <div class="user-badge">
                <i class="fa fa-user-circle"></i>
                <span>{{ invitation.email }}</span>
            </div>

            <p class="instruction">Please set a secure password for your new account.</p>

            <form (submit)="onSubmit()" #inviteForm="ngForm">
                <div class="form-group">
                    <label>Set Password</label>
                    <div class="input-wrapper">
                        <i class="fa fa-lock input-icon"></i>
                        <input type="password" [(ngModel)]="password" name="password"
                            placeholder="At least 8 characters" required minlength="8">
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fa fa-shield-alt input-icon"></i>
                        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
                            placeholder="Repeat password" required>
                    </div>
                </div>

                <div class="error-feedback" *ngIf="password && confirmPassword && password !== confirmPassword">
                    Passwords do not match
                </div>

                <button type="submit" class="btn-submit"
                    [disabled]="submitting || !password || password !== confirmPassword">
                    <span *ngIf="!submitting">Accept Invitation & Join</span>
                    <span *ngIf="submitting"><i class="fa fa-circle-notch fa-spin"></i> Initializing...</span>
                </button>
            </form>
        </div>
    </div>
</div>
