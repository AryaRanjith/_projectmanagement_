<app-navbar></app-navbar>

<div class="auth-wrapper">
    <div class="mesh-gradient"></div>

    <div class="auth-container">
        <div class="glass-card">
            <div class="card-header">
                <div class="logo-area">
                    <div class="logo-icon">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <span class="logo-text">PRO Manage</span>
                </div>
                <h2>Create Account</h2>
                <p>Register your organization to get started</p>
            </div>

            <form (ngSubmit)="onSignupSubmit()" class="auth-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Organization Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-building field-icon"></i>
                            <input type="text" [(ngModel)]="registrationData.org_name" name="org_name"
                                placeholder="Enter Organisation Name" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Organization Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope field-icon"></i>
                            <input type="email" [(ngModel)]="registrationData.org_email" name="org_email"
                                placeholder="organisation@email.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Owner Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user field-icon"></i>
                            <input type="email" [(ngModel)]="registrationData.owner_email" name="owner_email"
                                placeholder="owner@email.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock field-icon"></i>
                            <input type="password" [(ngModel)]="registrationData.password" name="password"
                                placeholder="Enter Password" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="primary-btn" [disabled]="isProcessing">
                    <span *ngIf="!isProcessing">Register Organisation</span>
                    <span *ngIf="isProcessing" class="loader"></span>
                </button>

                <div class="error-box" *ngIf="errorMessage">
                    {{ errorMessage }}
                </div>
            </form>

            <div class="card-footer">
                Already have an account? <a routerLink="/account/login">Log In</a>
            </div>
        </div>
    </div>
</div>
