<div class="auth-wrapper">
    <div class="mesh-gradient"></div>

    <div class="auth-container">
        <div class="glass-card">
            <div class="card-header">
                <div class="logo-area">
                    <div class="logo-icon">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <span class="logo-text">PRO Manage</span>
                </div>
                <h2>Reset Password</h2>
                <p>Enter your email to receive a recovery link</p>
            </div>

            <form (ngSubmit)="sendResetLink()" class="auth-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope field-icon"></i>
                        <input type="email" [(ngModel)]="email" name="email" placeholder="your@email.com" required>
                    </div>
                </div>

                <button type="submit" class="primary-btn" [disabled]="isLoading">
                    <span *ngIf="!isLoading">Send Recovery Link</span>
                    <span *ngIf="isLoading" class="loader"></span>
                </button>

                <div class="error-box" *ngIf="error">
                    {{ error }}
                </div>

                <div class="success-box" *ngIf="isSuccess">
                    Recovery link sent successfully! Check your inbox.
                </div>
            </form>

            <div class="card-footer">
                Remember your password? <a routerLink="/account/login">Back to Login</a>
            </div>
        </div>
    </div>
</div>
